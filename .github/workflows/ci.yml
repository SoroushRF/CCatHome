name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build bundle
      run: npm run build

    - name: Lint
      run: npm run lint

    - name: Typecheck
      run: npm run typecheck

    - name: Test
      # Tier A budget asserted in src/index.test.ts (TIER_A_BUDGET / ADR 0004)
      run: npm run test

    - name: Coverage
      run: npm run coverage

  adversarial:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - name: Adversarial security suite
      run: npm run test:adversarial

  # R7.5.4 — prettier format:check gate
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - name: Prettier check
      run: npm run format:check
